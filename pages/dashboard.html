<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — platform_education</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/dashboard.css">
</head>
<body>

  <nav>
    <span class="brand-name">platform_education</span>
    <div class="nav-right">
      <span class="nav-user" id="nav-user">Welcome back 👋</span>
      <button class="btn-logout" onclick="logout()">Log out</button>
    </div>
  </nav>

  <main>
    <div class="page-header">
      <h1 class="page-title">Your Courses</h1>
      <p class="page-subtitle">Browse your courses or search to generate a new one.</p>
    </div>

    <div class="search-bar">
      <input class="search-input" type="text" id="search-input" placeholder="Search or generate a course — e.g. Machine Learning, Docker..." />
      <button class="btn-search" id="search-btn" onclick="handleSearch()">Generate</button>
    </div>

    <p class="section-label">Your Courses</p>
    <div class="error-banner" id="error-banner">⚠️ Could not load courses from server. Showing cached data.</div>
    <div class="courses-grid" id="courses-grid"></div>
  </main>

  <script src="../scripts/dashboard.js"></script>
</body>
</html>
