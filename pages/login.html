<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — platform_education</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/login.css">
</head>
<body>

  <div class="wrapper">

    <div class="brand">
      <span class="brand-name">platform_education</span>
    </div>

    <div class="card">

      <div class="tabs">
        <button class="tab active" id="tab-login" onclick="switchTo('login')">Login</button>
        <button class="tab" id="tab-signup" onclick="switchTo('signup')">Sign Up</button>
      </div>

      <!-- LOGIN FORM -->
      <div id="login-form" class="form-section">
        <div class="input-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" />
        </div>
        <div class="input-group">
          <label for="login-password">Password</label>
          <div style="position:relative;">
            <input type="password" id="login-password" placeholder="••••••••" style="padding-right:44px;" />
            <button type="button" onclick="togglePassword('login-password', this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:#7A7A7A;">👁</button>
          </div>
        </div>
        <div id="login-message" class="message"></div>
        <button class="btn-primary" onclick="handleLogin()">Login</button>
      </div>

      <!-- SIGNUP FORM -->
      <div id="signup-form" class="form-section">
        <div class="input-group">
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" placeholder="you@example.com" />
        </div>
        <div class="input-group">
          <label for="signup-password">Password</label>
          <div style="position:relative;">
            <input type="password" id="signup-password" placeholder="••••••••" style="padding-right:44px;" />
            <button type="button" onclick="togglePassword('signup-password', this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:#7A7A7A;">👁</button>
          </div>
        </div>
        <div class="input-group">
          <label for="signup-confirmpassword">Confirm Password</label>
          <div style="position:relative;">
            <input type="password" id="signup-confirmpassword" placeholder="••••••••" style="padding-right:44px;" />
            <button type="button" onclick="togglePassword('signup-confirmpassword', this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:#7A7A7A;">👁</button>
          </div>
        </div>
        <div id="signup-message" class="message"></div>
        <button class="btn-primary" onclick="handleSignup()">Create Account</button>
      </div>

    </div>
  </div>

  <script src="../scripts/login.js"></script>
</body>
</html>
